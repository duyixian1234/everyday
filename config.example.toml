# Everyday configuration example
# Copy to ~/.config/everyday/config.toml and edit.
# Passwords are NEVER stored here — use the system keyring instead.
# keyring service convention: everyday/<module>/<account>

[default_account]
mail = "work"
calendar = "personal"
note = "personal"
todo = "personal"

# ---- 邮件账户（可多个）----
[[mail.accounts]]
name = "work"
imap_host = "imap.example.com"
imap_port = 993
smtp_host = "smtp.example.com"
smtp_port = 587
username = "me@example.com"
tls = true

[[mail.accounts]]
name = "personal"
imap_host = "imap.gmail.com"
imap_port = 993
smtp_host = "smtp.gmail.com"
smtp_port = 587
username = "me@gmail.com"
tls = true

# ---- 日历账户（CalDAV）----
# QQ 邮箱日历示例：caldav_url = "https://dav.qq.com"，username = 完整邮箱地址
# 密码用授权码（非登录密码），通过 `everyday cal login --account NAME` 存入 keyring
# service 名约定：everyday/cal/<account>
#
# 可选：在该账户下配置 ignore_calendars（按 displayname 匹配，不区分大小写），
# 被忽略的日历不会出现在 `cal calendars` / `cal list` / `cal add` 中。零到多个。
[[calendar.accounts]]
name = "personal"
caldav_url = "https://caldav.example.com/me"
username = "me"
ignore_calendars = ["好友生日"]

# ---- RSS 订阅源 ----
[[rss.feeds]]
name = "hackernews"
url = "https://hnrss.org/frontpage"
category = "tech"

[[rss.feeds]]
name = "rust-blog"
url = "https://blog.rust-lang.org/feed.xml"

# ---- 笔记账户（Notion 等；可多个）----
# provider 预留扩展（notion / 未来 obsidian、feishu 等）
# 凭证（Notion Integration Token，形如 ntn_...）绝不写在此文件，
# 通过 `everyday note login --account personal` 存入系统 keyring，
# service 名约定：everyday/note/<account>
# default_database_id / default_page_id 为常用目标预设，减少 Agent 重复输入长字符串
[[note.accounts]]
name = "personal"
provider = "notion"
default_database_id = "db_abc123..."   # 例如：阅读清单、灵感库
default_page_id = "page_xyz789..."     # 例如：每日速记本

# 本地 SQLite provider：无需凭证/联网，数据存本地 .db 文件。
# provider = "local"（别名 "sqlite"）。db_path 可选，缺省为
# ~/.config/everyday/note-<account>.db。用法与 notion 一致：
#   everyday note --account local create --title "标题" --prop 类型:文章
#   everyday note --account local append <id> --text "正文"
[[note.accounts]]
name = "local"
provider = "local"
# db_path = "/absolute/path/to/notes.db"   # 可选，覆盖默认路径

# ---- 待办账户（Notion 任务数据库；可多个）----
# provider 预留扩展（notion）
# 凭证（Notion Integration Token，形如 ntn_...）绝不写在此文件，
# 通过 `everyday todo login --account personal` 存入系统 keyring，
# service 名约定：everyday/todo/<account>
# parent_page_id：创建任务数据库时的父级页面（init-db 需要）
# default_database_id：由 `everyday todo init-db` 成功后自动回填此处
[[todo.accounts]]
name = "personal"
provider = "notion"
parent_page_id = "page_parent_..."     # 例如：用于承载任务数据库的 Notion 页面

# 本地 SQLite provider：无需凭证/联网，任务存本地 .db 文件。
# provider = "local"（别名 "sqlite"）。db_path 可选，缺省为
# ~/.config/everyday/todo-<account>.db。用法与 notion 一致：
#   everyday todo --account local init-db          # 建表（首次可选，各命令会自动建表）
#   everyday todo --account local add --title "任务" --due 2026-07-15 --priority P0
#   everyday todo --account local list
#   everyday todo --account local complete <id>
[[todo.accounts]]
name = "local"
provider = "local"
# db_path = "/absolute/path/to/todos.db"   # 可选，覆盖默认路径
